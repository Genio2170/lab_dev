<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaPulse — Agregador de Notícias</title>

  <!-- Google Fonts: Syne (display) + DM Sans (corpo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  
</head>
<style>
    /* ═══════════════════════════════════════════════
   variables.css — Design Tokens do NovaPulse
   ═══════════════════════════════════════════════ */

:root {
  /* ── Paleta principal ── */
  --bg-base:       #080c14;       /* fundo profundo */
  --bg-surface:    #0d1220;       /* cards e painéis */
  --bg-elevated:   #131929;       /* elementos elevados */
  --bg-hover:      #1a2235;       /* hover suave */

  --accent:        #3b82f6;       /* azul primário */
  --accent-glow:   #3b82f640;     /* brilho do azul */
  --accent-light:  #60a5fa;       /* azul claro */
  --accent-dark:   #1d4ed8;       /* azul escuro */

  --success:       #22c55e;
  --warning:       #f59e0b;
  --danger:        #ef4444;

  /* ── Texto ── */
  --text-primary:  #f0f4ff;
  --text-secondary:#8da0bf;
  --text-muted:    #4a5a72;
  --text-on-accent:#ffffff;

  /* ── Bordas ── */
  --border:        #1e2d45;
  --border-focus:  #3b82f6;

  /* ── Tipografia ── */
  --font-display:  'Syne', sans-serif;
  --font-body:     'DM Sans', sans-serif;

  /* ── Espaçamento ── */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;

  /* ── Raios ── */
  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  18px;
  --radius-xl:  24px;

  /* ── Sombras ── */
  --shadow-card:  0 4px 24px rgba(0,0,0,.4);
  --shadow-glow:  0 0 20px var(--accent-glow);
  --shadow-lg:    0 8px 40px rgba(0,0,0,.6);

  /* ── Transições ── */
  --trans-fast:   0.15s ease;
  --trans-base:   0.25s ease;
  --trans-slow:   0.4s ease;

  /* ── Sidebar ── */
  --sidebar-w:    240px;
  --sidebar-w-collapsed: 68px;
}
/* ═══════════════════════════════════════════════
   base.css — Reset e Estilos Globais
   ═══════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  font-weight: 400;
  background-color: var(--bg-base);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;

  /* Textura sutil de fundo */
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%, #1a2d5020 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 90% 80%, #3b82f608 0%, transparent 60%);
  background-attachment: fixed;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { max-width: 100%; display: block; }
ul, ol { list-style: none; }
input, textarea { font-family: inherit; }

/* Scrollbar personalizada */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
}
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Seleção de texto */
::selection {
  background: var(--accent-glow);
  color: var(--accent-light);
}

/* ── Utilitários ── */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

/* ── Skeleton loader ── */
.skeleton {
  background: linear-gradient(
    90deg,
    var(--bg-elevated) 0%,
    var(--bg-hover) 50%,
    var(--bg-elevated) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: var(--radius-md);
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Spinner ── */
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Badge de categoria ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: var(--accent-glow);
  color: var(--accent-light);
  border: 1px solid var(--accent-dark);
}

.badge--tech     { background: #3b82f620; color: #60a5fa; border-color: #3b82f640; }
.badge--world    { background: #8b5cf620; color: #a78bfa; border-color: #8b5cf640; }
.badge--business { background: #22c55e20; color: #4ade80; border-color: #22c55e40; }
.badge--science  { background: #f59e0b20; color: #fbbf24; border-color: #f59e0b40; }
.badge--sports   { background: #ef444420; color: #f87171; border-color: #ef444440; }
.badge--culture  { background: #ec489920; color: #f472b6; border-color: #ec489940; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: var(--space-6);
  right: var(--space-6);
  padding: var(--space-3) var(--space-5);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  color: var(--text-primary);
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity var(--trans-base), transform var(--trans-base);
  max-width: 320px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.toast.success { border-left-color: var(--success); }
.toast.error   { border-left-color: var(--danger); }
/* ═══════════════════════════════════════════════
   layout.css — Estrutura Sidebar + Conteúdo
   ═══════════════════════════════════════════════ */

/* ── Wrapper geral ── */
body {
  display: flex;
}

/* ── Main content ── */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  padding: var(--space-5) var(--space-6);
  transition: margin-left var(--trans-base);
}

/* ── Topbar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--border);
}

.topbar__search {
  flex: 1;
  position: relative;
  max-width: 480px;
}

.topbar__search svg {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--text-muted);
  pointer-events: none;
}

.topbar__search input {
  width: 100%;
  padding: 10px 16px 10px 44px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-size: 0.9rem;
  transition: border-color var(--trans-fast), box-shadow var(--trans-fast);
  outline: none;
}

.topbar__search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.topbar__search input::placeholder { color: var(--text-muted); }

.topbar__actions { display: flex; gap: var(--space-2); margin-left: auto; }

.icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  transition: all var(--trans-fast);
}

.icon-btn svg { width: 18px; height: 18px; }

.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent-light);
  box-shadow: var(--shadow-glow);
}

/* ── Hamburger (mobile) ── */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: space-between;
  width: 24px; height: 18px;
}

.hamburger span {
  display: block;
  width: 100%; height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: all var(--trans-base);
}

.hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

/* ── Page header ── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: var(--space-5);
}

.page-header h1 {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1.1;
}

.page-header__date {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-top: var(--space-1);
}

.page-header__live {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 6px 14px;
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.25);
  border-radius: 99px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: #f87171;
}

.live-dot {
  width: 7px; height: 7px;
  background: var(--danger);
  border-radius: 50%;
  animation: pulse-dot 1.4s ease infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

/* ── Filters ── */
.filters {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-bottom: var(--space-5);
}

.filter-btn {
  padding: 7px 18px;
  border-radius: 99px;
  font-size: 0.82rem;
  font-weight: 500;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  transition: all var(--trans-fast);
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent-light);
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 14px var(--accent-glow);
}

/* ── Hero card ── */
.hero-card {
  margin-bottom: var(--space-6);
  border-radius: var(--radius-xl);
  overflow: hidden;
  position: relative;
  min-height: 320px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform var(--trans-base), box-shadow var(--trans-base);
}

.hero-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-glow);
}

.hero-card__skeleton { width: 100%; height: 320px; }

.hero-card__img {
  width: 100%; height: 320px;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease;
}

.hero-card:hover .hero-card__img { transform: scale(1.03); }

.hero-card__overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(8,12,20,.96) 0%, rgba(8,12,20,.3) 60%, transparent 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: var(--space-6);
}

.hero-card__meta {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}

.hero-card__source {
  font-size: 0.78rem;
  color: var(--text-muted);
}

.hero-card__title {
  font-family: var(--font-display);
  font-size: clamp(1.3rem, 2.5vw, 1.9rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: var(--space-2);
  color: var(--text-primary);
}

.hero-card__desc {
  color: var(--text-secondary);
  font-size: 0.9rem;
  max-width: 600px;
  margin-bottom: var(--space-4);
}

.hero-card__actions {
  display: flex;
  gap: var(--space-3);
  align-items: center;
}

.btn-primary {
  padding: 9px 22px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-md);
  font-size: 0.85rem;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all var(--trans-fast);
}

.btn-primary:hover {
  background: var(--accent-dark);
  box-shadow: var(--shadow-glow);
}

/* ── Section title ── */
.section-title {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin-bottom: var(--space-5);
}

.section-title h2 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  white-space: nowrap;
}

.section-line {
  display: block;
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}

/* ── Loading indicator ── */
.loading-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  padding: var(--space-7) 0;
  color: var(--text-muted);
  font-size: 0.875rem;
  opacity: 0;
  transition: opacity var(--trans-base);
}

.loading-indicator.visible { opacity: 1; }

/* ── Mobile overlay ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(2px);
  z-index: 99;
}

.overlay.active { display: block; 
}
/* ═══════════════════════════════════════════════
   cards.css — News Cards Grid
   ═══════════════════════════════════════════════ */

/* ── Grid ── */
.news-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}

/* ── Card base ── */
.news-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  position: relative;
  transition:
    transform var(--trans-base),
    box-shadow var(--trans-base),
    border-color var(--trans-base);
  animation: cardIn 0.45s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.news-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-card), 0 0 28px rgba(59,130,246,.12);
  border-color: rgba(59,130,246,.3);
}

/* ── Card imagem ── */
.news-card__img-wrap {
  aspect-ratio: 16/9;
  overflow: hidden;
  background: var(--bg-elevated);
  position: relative;
}

.news-card__img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.news-card:hover .news-card__img { transform: scale(1.06); }

/* Placeholder sem imagem */
.news-card__img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--bg-elevated), var(--bg-hover));
  color: var(--text-muted);
  font-size: 2rem;
}

/* ── Card body ── */
.news-card__body {
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: var(--space-2);
}

/* ── Card meta (topo) ── */
.news-card__meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}

/* ── Botão favorito ── */
.fav-btn {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  transition: color var(--trans-fast), transform var(--trans-fast), background var(--trans-fast);
  flex-shrink: 0;
}

.fav-btn svg { width: 16px; height: 16px; }

.fav-btn:hover {
  color: #f87171;
  background: rgba(239,68,68,.1);
  transform: scale(1.15);
}

.fav-btn.active {
  color: #f87171;
  fill: #f87171;
}

.fav-btn.active svg { fill: #f87171; }

/* Animação de clique */
.fav-btn.pop {
  animation: favPop 0.35s ease;
}

@keyframes favPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.5); }
  70%  { transform: scale(0.9); }
  100% { transform: scale(1); }
}

/* ── Título ── */
.news-card__title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.35;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── Descrição ── */
.news-card__desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

/* ── Footer do card ── */
.news-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  padding-top: var(--space-3);
  border-top: 1px solid var(--border);
  margin-top: var(--space-2);
}

.news-card__source {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.news-card__source::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
}

.news-card__date {
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* ── Skeleton card ── */
.news-card--skeleton {
  pointer-events: none;
}

.sk-img  { width: 100%; aspect-ratio: 16/9; }
.sk-line { height: 12px; border-radius: 6px; margin-bottom: 8px; }
.sk-short { width: 55%; 
}
/* ═══════════════════════════════════════════════
   sidebar.css — Sidebar Navigation
   ═══════════════════════════════════════════════ */

.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform var(--trans-base), width var(--trans-base);
  overflow: hidden;
}

/* ── Brand ── */
.sidebar__brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-5) var(--space-4);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
}

.sidebar__logo {
  font-size: 1.5rem;
  color: var(--accent-light);
  flex-shrink: 0;
  filter: drop-shadow(0 0 8px var(--accent));
  animation: logoGlow 3s ease infinite alternate;
}

@keyframes logoGlow {
  from { filter: drop-shadow(0 0 4px var(--accent)); }
  to   { filter: drop-shadow(0 0 12px var(--accent-light)); }
}

.sidebar__name {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

/* ── Nav ── */
.sidebar__nav {
  flex: 1;
  padding: var(--space-4) var(--space-3);
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  overflow-y: auto;
  overflow-x: hidden;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 10px var(--space-3);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: 0.875rem;
  font-weight: 400;
  transition: all var(--trans-fast);
  white-space: nowrap;
  position: relative;
}

.nav-item svg {
  width: 20px; height: 20px;
  flex-shrink: 0;
  transition: color var(--trans-fast);
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-glow);
  color: var(--accent-light);
  font-weight: 500;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 60%;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

/* ── User area ── */
.sidebar__user {
  padding: var(--space-4);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  overflow: hidden;
}

.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0.05em;
}

.user-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.user-name {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-role {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.logout-btn {
  color: var(--text-muted);
  display: flex; align-items: center;
  padding: 4px;
  border-radius: var(--radius-sm);
  transition: color var(--trans-fast);
  flex-shrink: 0;
}

.logout-btn svg { width: 16px; height: 16px; }
.logout-btn:hover { color: var(--danger); 
}
/* ═══════════════════════════════════════════════
   responsive.css — Breakpoints e Mobile First
   ═══════════════════════════════════════════════ */

/* ── Tablet (≤ 1024px) ── */
@media (max-width: 1024px) {
  .news-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Mobile large (≤ 768px) ── */
@media (max-width: 768px) {
  /* Sidebar escondida por padrão */
  .sidebar {
    transform: translateX(-100%);
    z-index: 200;
  }

  .sidebar.open { transform: translateX(0); }

  /* Mostrar hamburger */
  .hamburger { display: flex; }

  /* Conteúdo ocupa tudo */
  .main-content {
    margin-left: 0;
    padding: var(--space-4);
  }

  /* Grid single col */
  .news-grid { grid-template-columns: 1fr; }

  /* Hero menor */
  .hero-card { min-height: 240px; }
  .hero-card__img { height: 240px; }
  .hero-card__skeleton { height: 240px; }
  .hero-card__overlay { padding: var(--space-4); }

  /* Filters scroll horizontal */
  .filters {
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: var(--space-2);
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  /* Page header compacto */
  .page-header__live { display: none; }

  /* Toast posição */
  .toast {
    bottom: var(--space-4);
    right: var(--space-4);
    left: var(--space-4);
    max-width: none;
  }
}

/* ── Mobile small (≤ 480px) ── */
@media (max-width: 480px) {
  .topbar__search { max-width: none; }

  .main-content { padding: var(--space-3); }

  .news-card__body { padding: var(--space-3); }

  .hero-card__title { font-size: 1.1rem; }
  .hero-card__desc  { display: none; }
}

/* ── Desktop wide (≥ 1440px) ── */
@media (min-width: 1440px) {
  .news-grid { grid-template-columns: repeat(4, 1fr); }
  .main-content { padding: var(--space-6) var(--space-8); }
}
</style>
